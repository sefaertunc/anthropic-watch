<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>anthropic-watch</title>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        max-width: 640px;
        margin: 4rem auto;
        padding: 0 1rem;
        color: #1a1a1a;
        line-height: 1.6;
      }
      h1 {
        margin-bottom: 0.25rem;
      }
      .subtitle {
        color: #666;
        margin-top: 0;
      }
      a {
        color: #2563eb;
      }
      .feeds {
        margin: 2rem 0;
      }
      .feeds a {
        display: inline-block;
        margin-right: 1rem;
        padding: 0.4rem 0.8rem;
        border: 1px solid #ddd;
        border-radius: 4px;
        text-decoration: none;
      }
      .feeds a:hover {
        background: #f5f5f5;
      }
      footer {
        margin-top: 3rem;
        color: #999;
        font-size: 0.85rem;
      }
    </style>
  </head>
  <body>
    <h1>anthropic-watch</h1>
    <p class="subtitle">Monitoring Anthropic sources for changes.</p>

    <div class="feeds">
      <h2>Feeds</h2>
      <a href="feeds/all.json">JSON Feed</a>
      <a href="feeds/all.xml">RSS Feed</a>
    </div>

    <p>
      This site publishes RSS and JSON feeds tracking changes across Anthropic's
      GitHub repositories, npm packages, documentation, and blog posts. Feeds
      are updated daily via GitHub Actions.
    </p>

    <footer>
      <a href="https://github.com/anthropics/anthropic-watch">GitHub</a>
    </footer>
  </body>
</html>
