name: Scrape and Deploy

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.SCRAPER_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node src/cli.js

      - name: Write job summary
        if: always()
        run: node src/summary.js >> $GITHUB_STEP_SUMMARY

      - name: Commit state changes
        run: |
          git config user.name "anthropic-watch[bot]"
          git config user.email "anthropic-watch[bot]@users.noreply.github.com"
          git add state/last-seen.json
          if git diff --cached --quiet; then
            echo "No state changes to commit"
            exit 0
          fi
          git commit -m "chore: update last-seen state"
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then
              exit 0
            fi
            sleep $((i * 5))
          done
          exit 1

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.SCRAPER_PAT }}
          publish_dir: ./public
          keep_files: true
